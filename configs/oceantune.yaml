# OceanTune AI — Main Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Edit this file to change model / GPU / search strategy.
# Secrets (HF_TOKEN, DO_SPACES_KEY, DO_SPACES_SECRET) MUST be in .env
# ─────────────────────────────────────────────────────────────────────────────

# ── Model ─────────────────────────────────────────────────────────────────────
# Set to ANY Hugging Face model ID — aliases below are just shortcuts.
# Examples of custom models that work directly:
#   "meta-llama/Llama-3.1-70B-Instruct"
#   "mistralai/Mistral-7B-Instruct-v0.3"
#   "google/gemma-2-27b-it"
#   "Qwen/Qwen2.5-72B-Instruct"
#
# Override at runtime (no YAML edit needed):
#   CLI flag:   oceantune run --model meta-llama/Llama-3.1-70B-Instruct
#   Env var:    export OCEANTUNE_MODEL_ID=meta-llama/Llama-3.1-70B-Instruct
#
# Pre-defined aliases (configs/models.yaml):
#   NVIDIA + AMD:
#     deepseek_v3_2            deepseek-ai/DeepSeek-V3.2            (671B MoE)
#     minimax_m2_5             MiniMaxAI/MiniMax-M2.5               (229B MoE)
#     kimi_k2_5                moonshotai/Kimi-K2.5                 (1T MoE)
#     qwen3_5_397b             Qwen/Qwen3.5-397B-A17B               (397B MoE)
#
#   NVIDIA only (NVFP4 — Hopper/Blackwell):
#     deepseek_v3_2_nvfp4      nvidia/DeepSeek-V3.2-NVFP4
#     kimi_k2_5_nvfp4          nvidia/Kimi-K2.5-NVFP4
#     qwen3_5_397b_nvfp4       nvidia/Qwen3.5-397B-A17B-NVFP4
#
model_id: "deepseek-ai/DeepSeek-V3.2"

# ── GPU ───────────────────────────────────────────────────────────────────────
# Must match a key in configs/gpu_profiles.yaml exactly.
#
# NVIDIA:  H100  |  H200  |  B300
# AMD:     MI300X  |  MI325X  |  MI350X
#
gpu_type: "H200"

# ── AI Agent — DigitalOcean Serverless Inference ─────────────────────────────
# All agents (Planner, Executor, Analyst, Kernel Optimizer) call DO Serverless
# Inference. Credentials go in .env (DO_INFERENCE_KEY, DO_INFERENCE_ENDPOINT).
#
# Override which model the agent uses (optional — defaults to highest-rated):
#   export DO_INFERENCE_MODEL=deepseek-ai/DeepSeek-R1
#
# Available models are defined in configs/inference_models.yaml.
# If DO_INFERENCE_KEY is not set, the agent falls back to evolutionary search.
agent:
  # Model selection: "auto" picks highest suitability_score from registry
  # or set a specific model_id from configs/inference_models.yaml
  model: "auto"
  # Max tokens the agent can use per reasoning turn
  max_tokens: 4096
  # Seconds before an agent API call times out
  timeout_sec: 120
  # Max tool-call turns per proposal round (prevents infinite loops)
  max_turns: 6
  # Temperature: lower = more deterministic proposals
  temperature: 0.3

# ── Database — MongoDB ────────────────────────────────────────────────────────
# All benchmark results, session metadata, and kernel results are stored in
# MongoDB for analytics and cross-session deduplication.
# Credentials go in .env: MONGO_URI (full connection string)
database:
  # Connection URI — MUST be set via MONGO_URI env var (no local MongoDB assumed).
  # DO Managed MongoDB:  mongodb+srv://user:pass@host/oceantune?tls=true&authSource=admin
  # MongoDB Atlas:       mongodb+srv://user:pass@cluster.mongodb.net/oceantune?retryWrites=true
  uri: ""   # set via: export MONGO_URI="mongodb+srv://..."
  # Database name
  name: "oceantune"
  # Collections (rarely need changing)
  collections:
    sessions: "sessions"
    nodes: "nodes"
    configs: "configs"
    benchmark_runs: "benchmark_runs"
    kernel_runs: "kernel_runs"

# ── GPU Nodes ─────────────────────────────────────────────────────────────────
# List of GPU droplets that the Coordinator dispatches work to.
# Each node runs node/node_server.py (FastAPI) on node_port.
# gpu_indices: which physical GPU indices this node exposes.
# For a single-node setup, point to localhost.
nodes:
  - host: "localhost"
    node_port: 9000
    gpu_type: "H200"
    gpu_indices: [0]             # single H200; add more indices (e.g. [0,1]) for multi-GPU

# ── Coordinator ───────────────────────────────────────────────────────────────
coordinator:
  # Max vLLM instances per node (limited by GPU count and tensor_parallel_size)
  # Single GPU → 1; 8 GPUs → up to 8 (but bound by model's tensor_parallel_size)
  max_parallel_per_node: 1
  # Port pool for vLLM instances on each node (8000–8099)
  port_pool_start: 8000
  port_pool_end: 8099
  # Seconds between coordinator dispatch-loop ticks
  poll_interval_sec: 5
  # Retry a config this many times before marking it failed
  max_retries: 2

# ── DigitalOcean Spaces ───────────────────────────────────────────────────────
spaces:
  bucket: "oceantune-results"
  region: "nyc3"
  endpoint_url: "https://nyc3.digitaloceanspaces.com"
  # Credentials → .env: DO_SPACES_KEY  DO_SPACES_SECRET

# ── vLLM Server ───────────────────────────────────────────────────────────────
vllm:
  host: "0.0.0.0"
  port: 8000
  # Large MoE models can take 10–20 min to load weights
  startup_timeout_sec: 1200
  # Docker image used to run vLLM. Leave empty to use the default from
  # configs/gpu_profiles.yaml for your gpu_type (recommended).
  # Override priority: VLLM_IMAGE env var > this field > gpu_profiles.yaml default
  #
  # NVIDIA latest:  vllm/vllm-openai:latest-cu130
  # NVIDIA pinned:  vllm/vllm-openai:v0.18.1-cu130
  # AMD latest:     vllm/vllm-openai-rocm:v0.18.1
  docker_image: ""   # or: export VLLM_IMAGE="vllm/vllm-openai:v0.18.1-cu130"

# ── Benchmark Engine ──────────────────────────────────────────────────────────
benchmark:
  # Concurrency ramp — number of concurrent requests per run
  concurrency_levels: [1, 2, 4, 8, 16, 32, 64]
  # Total prompts sent per concurrency level
  num_prompts: 30
  # Default token lengths (overridden per context_config entry)
  input_len: 1024
  output_len: 1024
  # Seconds to run each concurrency level before moving on
  duration_sec: 60

# ── Optimisation Engine ───────────────────────────────────────────────────────
# In v4, the LLM-guided Planner handles candidate ordering.
# population_size × generations = total configs benchmarked per run.
# strategy is kept for compatibility; "evolutionary" = use LLM guidance
#   (falls back to random sampling when DO_INFERENCE_KEY is not set).
optimiser:
  strategy: "evolutionary"      # config-compat label; v4 uses LLM-guided search
  population_size: 10           # candidates sampled per generation
  generations: 5                # number of search rounds
  mutation_rate: 0.2            # used by search_space crossover helpers
  elite_fraction: 0.2           # used by search_space crossover helpers
  # Primary metric drives fitness scoring in MetricsCollector and Analyst ranking
  primary_metric: "throughput"  # throughput | p95_latency | ttft | tpot

# ── Context-Length Evaluation Matrix ─────────────────────────────────────────
# Each [input_tokens, output_tokens] pair → separate optimisation recipe.
context_configs:
  - [1024,   1024]
  - [1024,   4096]