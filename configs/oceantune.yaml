# OceanTune AI — Main Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Edit this file to change model / GPU / search strategy.
# Secrets (HF_TOKEN, DO_SPACES_KEY, DO_SPACES_SECRET) MUST be in .env
# ─────────────────────────────────────────────────────────────────────────────

# ── Model ─────────────────────────────────────────────────────────────────────
# Full Hugging Face model ID or alias from configs/models.yaml.
#
# Available aliases:
#   NVIDIA + AMD:
#     deepseek_v3_2            deepseek-ai/DeepSeek-V3.2            (671B MoE)
#     minimax_m2_5             MiniMaxAI/MiniMax-M2.5               (229B MoE)
#     kimi_k2_5                moonshotai/Kimi-K2.5                 (1T MoE)
#     qwen3_5_397b             Qwen/Qwen3.5-397B-A17B               (397B MoE)
#
#   NVIDIA only (NVFP4 — Hopper/Blackwell):
#     deepseek_v3_2_nvfp4      nvidia/DeepSeek-V3.2-NVFP4
#     kimi_k2_5_nvfp4          nvidia/Kimi-K2.5-NVFP4
#     qwen3_5_397b_nvfp4       nvidia/Qwen3.5-397B-A17B-NVFP4
#
model_id: "deepseek-ai/DeepSeek-V3.2"

# ── GPU ───────────────────────────────────────────────────────────────────────
# Must match a key in configs/gpu_profiles.yaml exactly.
#
# NVIDIA:  H100  |  H200  |  B300
# AMD:     MI300X  |  MI325X  |  MI350X
#
gpu_type: "H100"

# ── DigitalOcean Spaces ───────────────────────────────────────────────────────
spaces:
  bucket: "oceantune-results"
  region: "nyc3"
  endpoint_url: "https://nyc3.digitaloceanspaces.com"
  # Credentials → .env: DO_SPACES_KEY  DO_SPACES_SECRET

# ── vLLM Server ───────────────────────────────────────────────────────────────
vllm:
  host: "0.0.0.0"
  port: 8000
  # Large MoE models can take 10–20 min to load weights
  startup_timeout_sec: 1200

# ── Benchmark Engine ──────────────────────────────────────────────────────────
benchmark:
  # Concurrency ramp — number of concurrent requests per run
  concurrency_levels: [1, 2, 4, 8, 16, 32, 64]
  # Total prompts sent per concurrency level
  num_prompts: 200
  # Default token lengths (overridden per context_config entry)
  input_len: 1024
  output_len: 1024
  # Seconds to run each concurrency level before moving on
  duration_sec: 60

# ── Optimisation Engine ───────────────────────────────────────────────────────
optimiser:
  strategy: "evolutionary"      # evolutionary | grid | random | bayesian
  population_size: 10
  generations: 5
  mutation_rate: 0.2
  elite_fraction: 0.2
  # Primary metric drives fitness scoring; secondary metrics are recorded
  primary_metric: "throughput"  # throughput | p95_latency | ttft | tpot

# ── Context-Length Evaluation Matrix ─────────────────────────────────────────
# Each [input_tokens, output_tokens] pair → separate optimisation recipe.
context_configs:
  - [1024,   1024]
  - [1024,   4096]
  - [1024,   8192]
  - [2048,   8192]
  - [4096,  16384]
  - [8192,  32768]
